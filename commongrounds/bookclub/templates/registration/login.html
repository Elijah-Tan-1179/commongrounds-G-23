{% extends 'base.html' %}

{% block title %}Login | Common Grounds{% endblock %}

{% block content %}
    <h2>Sign In</h2>
    <p>Please enter your credentials to access the book club features.</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <hr>
    <a href="{% url 'password_reset' %}">Forgot password?</a>
{% endblock %}
