<h2>{% if object %}Edit{% else %}Create{% endif %} Commission</h2>

<form method="post">
    {% csrf_token %}
    <h3>Commission Details</h3>
    {{ form.as_p }}

    <h3>Jobs Required</h3>
    {{ job_formset.management_form }}
    {% for job_form in job_formset %}
        <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px;">
            {{ job_form.as_p }}
        </div>
    {% endfor %}

    <button type="submit">Save Commission</button>
</form>
